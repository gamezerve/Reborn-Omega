; FILE: RebornCamera.ini /////////////////////////////////////////////////
;//////////////////////////////////////////////////////////////////////////////

; ---------------------------------------------------------------------
; Reborn Camera Configuration
; ---------------------------------------------------------------------
; This file is used to fix camera direction issues for the SETUP_CAMERA
; script action on specific maps.
;
; Problem:
; On some maps (mainly the ones coming from Generals), the "looking towards waypoint" parameter does not work
; correctly, causing the camera to face the wrong direction initially.
;
; Solution:
; For the maps listed below, the camera angle is manually calculated
; using the vector from InitialCameraPosition to the LookAt waypoint.
;
; Usage:
; Add one entry per map:
; RebornForceSetupCameraAngleMap = MapName.map
;
; Example:
; RebornForceSetupCameraAngleMap = ShellMap1.map
;
; Notes:
; - Case-insensitive
; - The .map extension must be included
; - Only maps listed here are affected
; ---------------------------------------------------------------------

RebornCamera

  RebornForceSetupCameraAngleMap = ShellMap1.map
  ; RebornForceSetupCameraAngleMap = MapName.map

END