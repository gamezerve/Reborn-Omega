  ; *** ENGINEERING Parameters ***
  RadarPriority   = STRUCTURE
  KindOf          = PRELOAD STRUCTURE SELECTABLE IMMOBILE REPAIR_PAD SCORE CAPTURABLE FS_FACTORY AUTO_RALLYPOINT MP_COUNT_FOR_VICTORY FS_WARFACTORY NAVAL_YARD
  Body            = StructureBody ModuleTag_09
    MaxHealth       = 2000.0
    InitialHealth   = 2000.0

    ; Subdual damage "Subdues" you (reaction defined by BodyModule) when it passes your max health.
    ; The cap limits how extra-subdued you can be, and the other numbers detemine how fast it drains away on its own.
    SubdualDamageCap = 2500
    SubdualDamageHealRate = 500
    SubdualDamageHealAmount = 100
  End
  Behavior = ProductionUpdate ModuleTag_10
    NumDoorAnimations            = 1
    DoorOpeningTime              = 3250  ;in mSeconds
    DoorWaitOpenTime             = 3000  ;in mSeconds
    DoorCloseTime                = 4000  ;in mSeconds
    ConstructionCompleteDuration = 1500  ;in mSeconds
  End
  Behavior = DefaultProductionExitUpdate ModuleTag_11
    UnitCreatePoint   = X: 140.0  Y:-1,48   Z:-20.0 ;99,878
    NaturalRallyPoint = X: 130.0  Y:-1,48   Z:-20.0;NaturalRallyPointX must always match GeometryMajorRadius! -ML
    SpecialObject     = AirF_AmericaNavyAircraftCarrier ; Reborn: Special attributes for Aircraft Carrier spawn
    SpecialSpawnForwardOffset = 400.0                   ; Reborn: Specify a custom UnitCreatePoint for SpecialObject - x axis
    SpecialSpawnLateralOffset = 0.0                     ; Reborn: Specify a custom UnitCreatePoint for SpecialObject - y axis
    SpecialObjectSpawnsRotated          = Yes           ; Reborn: Rotates SpecialObject randomly to either right or left
    SpecialObjectUsesCustomRallyPoint   = No            ; Reborn: SpecialObject follows the custom rally point like other units after spawning in its special spawn point
  End
  Behavior = RepairDockUpdate ModuleTag_12
    TimeForFullHeal   = 15000   ;(in milliseconds)     
    NumberApproachPositions = 5
  End
  Behavior = BaseRegenerateUpdate ModuleTag_13
    ;No data
  End 
  Behavior = TransitionDamageFX ModuleTag_15
